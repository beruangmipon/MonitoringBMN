<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layanan Servis BMN — Peralatan & Mesin | Bappebti</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap');

  html, body{
    margin:0; padding:0; min-height:100%;
  }
  body{
    min-height:100vh;
    background:linear-gradient(160deg, #0B1119 0%, #121B25 55%, #0B1119 100%);
    display:flex; align-items:flex-start; justify-content:center;
    padding:32px 20px;
    font-family:'Inter',sans-serif;
  }
  @media (max-width:640px){
    body{ padding:0; }
    #bst-root{ border-radius:0; box-shadow:none; max-width:100%; }
  }

  #bst-root {
    --ink:#0F1720;
    --paper:#FAFAF8;
    --paper-dim:#F0F2EE;
    --line:#E2E6DF;
    --primary:#059669;
    --primary-dim:#D1FAE5;
    --primary-text:#065F46;
    --amber:#D97706;
    --amber-dim:#FEF3C7;
    --amber-text:#92400E;
    --yellow:#CA8A04;
    --yellow-dim:#FEF9C3;
    --yellow-text:#854D0E;
    --red:#DC2626;
    --red-dim:#FEE2E2;
    --red-text:#7F1D1D;
    --info:#2563EB;
    --info-dim:#DBEAFE;
    --info-text:#1E3A8A;
    --slate:#64748B;
    font-family:'Inter',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 100% 0%, rgba(5,150,105,0.06) 0%, transparent 38%),
      radial-gradient(circle at 0% 100%, rgba(217,119,6,0.045) 0%, transparent 42%),
      var(--paper);
    border-radius:14px;
    padding:0;
    min-height:100%;
    box-sizing:border-box;
    width:100%;
    max-width:1180px;
    box-shadow:0 24px 70px rgba(0,0,0,0.35);
  }
  #bst-root *{ box-sizing:border-box; }
  #bst-root .disp{ font-family:'Sora',sans-serif; }
  #bst-root .mono{ font-family:'JetBrains Mono',monospace; }

  @keyframes bstFadeIn{ from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:translateY(0); } }
  @media (prefers-reduced-motion: reduce){
    #bst-root *{ animation:none !important; transition:none !important; }
  }

  /* ---------- Login screen ---------- */
  #bst-root .bst-login{
    position:relative; overflow:hidden;
    min-height:min(600px, 78vh);
    display:flex; flex-direction:column; justify-content:center;
    padding:52px 26px 44px; text-align:center;
    background:
      radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1.4px),
      linear-gradient(150deg, #0F1720 0%, #17222E 55%, #101A22 100%);
    background-size:26px 26px, 100% 100%;
    background-position:0 0, 0 0;
    border-radius:14px; color:var(--paper);
  }
  #bst-root .bst-login::before{
    content:""; position:absolute; top:-120px; left:50%; transform:translateX(-50%);
    width:640px; height:640px; border-radius:50%;
    background:radial-gradient(circle, rgba(5,150,105,0.22) 0%, rgba(5,150,105,0) 70%);
    pointer-events:none;
  }
  #bst-root .bst-building{
    position:absolute; right:-70px; bottom:-60px;
    width:420px; height:auto; max-width:52%;
    opacity:0.10; pointer-events:none; color:var(--primary);
    transform:rotate(-6deg);
  }
  #bst-root .bst-login > *:not(.bst-building){ position:relative; z-index:1; }
  #bst-root .bst-login-badge{
    display:inline-flex; align-items:center; gap:7px; padding:6px 14px; border-radius:20px;
    background:rgba(5,150,105,0.14); border:1px solid rgba(5,150,105,0.4);
    font-family:'JetBrains Mono',monospace; font-size:10.5px; color:#6EE7B7;
    text-transform:uppercase; letter-spacing:0.6px; margin-bottom:16px;
  }
  #bst-root .bst-login-badge .dot{ width:6px; height:6px; border-radius:50%; background:#6EE7B7; animation:bstpulse 2s infinite; }
  #bst-root .bst-login h2{ font-family:'Sora',sans-serif; font-weight:800; font-size:25px; margin:0 0 6px; letter-spacing:-0.2px; }
  #bst-root .bst-login p{ color:#A6B1BE; font-size:13px; margin:0 0 26px; max-width:460px; margin-left:auto; margin-right:auto; }
  #bst-root .role-grid{
    display:grid; grid-template-columns:repeat(5,1fr); gap:10px; max-width:780px; margin:0 auto 22px;
  }
  #bst-root .role-card{
    background:rgba(255,255,255,0.05); border:1.5px solid rgba(255,255,255,0.12);
    border-radius:12px; padding:16px 10px; cursor:pointer; transition:all .18s ease;
    color:var(--paper);
  }
  #bst-root .role-card:hover{ border-color:var(--primary); background:rgba(5,150,105,0.14); transform:translateY(-2px); }
  #bst-root .role-card.selected{ border-color:var(--primary); background:rgba(5,150,105,0.2); }
  #bst-root .role-card .ric{ font-size:22px; margin-bottom:8px; }
  #bst-root .role-card .rn{ font-family:'Sora',sans-serif; font-weight:700; font-size:13.5px; }
  #bst-root .role-card .rd{ font-size:10.5px; color:#A6B1BE; margin-top:4px; line-height:1.4; }
  #bst-root .bst-login-form{ max-width:320px; margin:0 auto; }
  #bst-root .bst-login-form input, #bst-root .bst-login-form select{
    width:100%; padding:11px 13px; border-radius:9px; border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.06); color:var(--paper); font-family:'Inter',sans-serif; font-size:13.5px;
    margin-bottom:12px; transition:border-color .15s ease, background .15s ease;
  }
  #bst-root .bst-login-form select{ cursor:pointer; }
  #bst-root .bst-login-form select:disabled{ opacity:.5; cursor:not-allowed; }
  #bst-root .bst-login-form select option{ color:#111; }
  #bst-root .bst-login-form input::placeholder{ color:#7C8896; }
  #bst-root .bst-login-form input:focus, #bst-root .bst-login-form select:focus{ outline:none; border-color:var(--primary); background:rgba(5,150,105,0.08); }
  #bst-root #pemohon-preview .note{
    background:rgba(5,150,105,0.12); border:1px solid rgba(5,150,105,0.4); color:#D1FAE5;
    text-align:left; font-size:12px; line-height:1.6;
  }
  #bst-root .bst-disclaimer{
    font-size:10.5px; color:#7C8896; max-width:420px; margin:18px auto 0; line-height:1.5;
    padding-top:14px;
  }

  /* ---------- Grafik RKBMN (layar awal, sebelum login) ---------- */
  #bst-root .rkbmn-section{
    margin-top:34px; padding-top:28px;
    text-align:left; max-width:660px; margin-left:auto; margin-right:auto;
  }
  #bst-root .rkbmn-header{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
  #bst-root .rkbmn-title{ font-size:15px; font-weight:700; color:var(--paper); }
  #bst-root .rkbmn-sub{ font-size:11px; color:#A6B1BE; margin-top:3px; font-family:'JetBrains Mono',monospace; }
  #bst-root .rkbmn-tabs{ display:flex; gap:6px; flex-wrap:wrap; }
  #bst-root .rkbmn-tab{
    font-family:'Inter',sans-serif; font-size:11px; font-weight:600; padding:6px 12px; border-radius:20px;
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.16); color:#A6B1BE; cursor:pointer;
    transition:all .15s ease;
  }
  #bst-root .rkbmn-tab:hover{ background:rgba(5,150,105,0.18); color:#fff; border-color:rgba(5,150,105,0.4); }
  #bst-root .rkbmn-tab.active{ background:var(--primary); border-color:var(--primary); color:#fff; }
  #bst-root .rkbmn-stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:22px; }
  #bst-root .rkbmn-stat{ background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:12px; text-align:center; }
  #bst-root .rkbmn-stat-num{ font-family:'Sora',sans-serif; font-weight:800; font-size:20px; color:var(--primary); }
  #bst-root .rkbmn-stat-lbl{ font-size:9.5px; color:#A6B1BE; margin-top:3px; text-transform:uppercase; letter-spacing:.4px; }
  #bst-root .rkbmn-table-wrap{ overflow-x:auto; border-radius:12px; border:1px solid rgba(255,255,255,0.1); }
  #bst-root .rkbmn-table{ width:100%; border-collapse:collapse; font-size:11.5px; }
  #bst-root .rkbmn-table thead th{
    text-align:left; font-family:'JetBrains Mono',monospace; font-size:9.5px; text-transform:uppercase;
    letter-spacing:.4px; color:#A6B1BE; background:rgba(255,255,255,0.05);
    padding:9px 12px; border-bottom:1px solid rgba(255,255,255,0.1);
  }
  #bst-root .rkbmn-table thead th:last-child, #bst-root .rkbmn-table td.rkbmn-td-jumlah{ text-align:right; }
  #bst-root .rkbmn-table thead th:first-child, #bst-root .rkbmn-table td.rkbmn-td-no{ text-align:center; }
  #bst-root .rkbmn-table tbody td{ padding:9px 12px; border-bottom:1px solid rgba(255,255,255,0.06); vertical-align:middle; }
  #bst-root .rkbmn-table tbody tr:last-child td{ border-bottom:none; }
  #bst-root .rkbmn-table tbody tr:hover{ background:rgba(255,255,255,0.04); }
  #bst-root .rkbmn-td-no{ color:#7C8896; font-family:'JetBrains Mono',monospace; font-size:10.5px; }
  #bst-root .rkbmn-td-nama{ color:#D8DEE4; font-weight:600; }
  #bst-root .rkbmn-td-kode{ color:#7C8896; font-family:'JetBrains Mono',monospace; font-size:9.5px; margin-top:1px; }
  #bst-root .rkbmn-kat-badge{
    font-family:'JetBrains Mono',monospace; font-size:9.5px; padding:3px 9px; border-radius:20px;
    text-transform:uppercase; letter-spacing:.3px; white-space:nowrap;
  }
  #bst-root .rkbmn-kat-kendaraan{ background:var(--amber-dim); color:var(--amber-text); }
  #bst-root .rkbmn-kat-elektronik{ background:var(--primary-dim); color:var(--primary-text); }
  #bst-root .rkbmn-td-jumlah{ font-family:'JetBrains Mono',monospace; font-weight:700; color:#fff; font-size:13px; }
  #bst-root .rkbmn-td-pct{ display:block; font-size:9px; font-weight:400; color:#7C8896; margin-top:1px; }
  #bst-root .rkbmn-empty{ font-size:12px; color:#A6B1BE; padding:14px; text-align:center; }
  #bst-root .rkbmn-footnote{ margin-top:16px; font-size:10px; color:#7C8896; font-family:'JetBrains Mono',monospace; line-height:1.6; }
  #bst-root .rkbmn-changes{
    margin-top:20px; padding:14px 16px; border-radius:12px;
    background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
  }
  #bst-root .rkbmn-changes-title{ font-size:11.5px; font-weight:700; color:var(--paper); margin-bottom:10px; }
  #bst-root .rkbmn-change-row{ display:flex; align-items:center; gap:8px; padding:5px 0; font-size:11px; flex-wrap:wrap; }
  #bst-root .rkbmn-change-icon{
    width:18px; height:18px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center;
    font-size:10px; font-weight:700; flex-shrink:0;
  }
  #bst-root .rkbmn-change-icon.rkbmn-delta-naik{ background:var(--primary-dim); color:var(--primary-text); }
  #bst-root .rkbmn-change-icon.rkbmn-delta-turun{ background:var(--red-dim); color:var(--red-text); }
  #bst-root .rkbmn-change-name{ color:#D8DEE4; font-weight:600; }
  #bst-root .rkbmn-change-detail{ color:#A6B1BE; font-family:'JetBrains Mono',monospace; font-size:10.5px; }
  #bst-root .rkbmn-change-detail .rkbmn-delta-naik{ color:#6EE7B7; }
  #bst-root .rkbmn-change-detail .rkbmn-delta-turun{ color:#FCA5A5; }

  /* ---------- Sandingan RKBMN vs RKAKL ---------- */
  #bst-root .compare-section{ margin-top:34px; padding-top:28px; }
  #bst-root .compare-legend{ display:flex; gap:18px; margin-bottom:18px; flex-wrap:wrap; }
  #bst-root .compare-legend-item{ display:flex; align-items:center; gap:6px; font-size:11px; color:#A6B1BE; }
  #bst-root .compare-swatch{ width:10px; height:10px; border-radius:3px; display:inline-block; }
  #bst-root .compare-swatch-rkbmn{ background:linear-gradient(90deg, var(--primary), #34D399); }
  #bst-root .compare-swatch-rkakl{ background:linear-gradient(90deg, #60A5FA, var(--info)); }
  #bst-root .compare-chart{ display:flex; flex-direction:column; gap:12px; }
  #bst-root .compare-row{ display:grid; grid-template-columns:1fr 168px 1fr; align-items:center; gap:10px; }
  #bst-root .compare-side{ display:flex; align-items:center; gap:8px; }
  #bst-root .compare-left{ flex-direction:row-reverse; }
  #bst-root .compare-track{ flex:1; height:9px; border-radius:5px; background:rgba(255,255,255,0.08); overflow:hidden; }
  #bst-root .compare-left .compare-track{ display:flex; justify-content:flex-end; }
  #bst-root .compare-fill{ height:100%; border-radius:5px; transition:width .3s ease; }
  #bst-root .compare-fill-rkbmn{ background:linear-gradient(90deg, var(--primary), #34D399); }
  #bst-root .compare-fill-rkakl{ background:linear-gradient(90deg, #60A5FA, var(--info)); }
  #bst-root .compare-val{ font-family:'JetBrains Mono',monospace; font-size:11.5px; font-weight:700; color:#fff; min-width:26px; text-align:center; }
  #bst-root .compare-label{ font-size:11px; color:#D8DEE4; text-align:center; font-weight:600; line-height:1.3; }

  /* ---------- Rekomendasi Tindak Lanjut ---------- */
  #bst-root .rekom-section{ margin-top:34px; padding-top:28px; }
  #bst-root .rekom-list{ display:flex; flex-direction:column; gap:14px; }
  #bst-root .rekom-item{ display:flex; gap:12px; align-items:flex-start; }
  #bst-root .rekom-num{
    width:26px; height:26px; border-radius:50%; flex-shrink:0;
    background:linear-gradient(135deg, var(--primary), #34D399); color:#fff;
    font-family:'Sora',sans-serif; font-weight:800; font-size:12px;
    display:flex; align-items:center; justify-content:center;
  }
  #bst-root .rekom-judul{ font-size:12.5px; font-weight:700; color:var(--paper); margin-bottom:3px; }
  #bst-root .rekom-isi{ font-size:11.5px; color:#A6B1BE; line-height:1.6; }

  /* ---------- Rekap Proses Pemeliharaan (inline, di dalam kartu login yang sama) ---------- */
  #bst-root .rekap-inline{ margin-top:30px; text-align:left; max-width:660px; margin-left:auto; margin-right:auto; }
  #bst-root .rekap-live{
    display:flex; align-items:center; gap:6px; font-size:10.5px; color:#A6B1BE;
    font-family:'JetBrains Mono',monospace; margin-top:4px;
  }
  #bst-root .rekap-inline-stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px; }
  #bst-root .rekap-stat{
    display:flex; align-items:center; gap:10px; padding:12px 10px; border-radius:10px;
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
    transition:transform .15s ease, background .15s ease;
  }
  #bst-root .rekap-stat:hover{ transform:translateY(-2px); background:rgba(255,255,255,0.08); }
  #bst-root .rekap-icon{
    width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center;
    font-size:15px; flex-shrink:0;
  }
  #bst-root .rekap-stat-selesai .rekap-icon{ background:var(--primary-dim); }
  #bst-root .rekap-stat-proses .rekap-icon{ background:var(--amber-dim); }
  #bst-root .rekap-stat-permohonan .rekap-icon{ background:rgba(255,255,255,0.14); }
  #bst-root .rekap-num{ font-family:'Sora',sans-serif; font-weight:800; font-size:20px; color:#fff; line-height:1.1; }
  #bst-root .rekap-lbl{ font-size:9.5px; color:#A6B1BE; margin-top:2px; text-transform:uppercase; letter-spacing:.4px; }

  /* ---------- Pilih jalur masuk (Pemohon vs Staf) ---------- */
  #bst-root .choose-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:14px; max-width:520px; margin:0 auto 22px;
  }
  #bst-root .choose-card{
    background:rgba(255,255,255,0.05); border:1.5px solid rgba(255,255,255,0.12);
    border-radius:14px; padding:26px 16px; cursor:pointer; transition:all .18s ease; text-align:center;
  }
  #bst-root .choose-card:hover{ border-color:var(--primary); background:rgba(5,150,105,0.14); transform:translateY(-3px); box-shadow:0 10px 24px rgba(0,0,0,0.25); }
  #bst-root .choose-card .ric{ font-size:32px; margin-bottom:10px; }
  #bst-root .choose-card .rn{ font-family:'Sora',sans-serif; font-weight:700; font-size:15px; margin-bottom:6px; }
  #bst-root .choose-card .rd{ font-size:11px; color:#A6B1BE; line-height:1.5; }

  /* ---------- Link & error area login staf ---------- */
  #bst-root .auth-links{
    max-width:320px; margin:14px auto 0; display:flex; flex-direction:column; gap:8px; align-items:center;
  }
  #bst-root .auth-links a{ color:var(--primary); font-size:12.5px; text-decoration:none; font-weight:500; }
  #bst-root .auth-links a:hover{ text-decoration:underline; }
  #bst-root .auth-error{
    max-width:320px; margin:0 auto 14px; background:rgba(220,38,38,0.16); border:1px solid rgba(220,38,38,0.45);
    color:#FCA5A5; font-size:12px; padding:9px 12px; border-radius:9px; text-align:left;
  }
  #bst-root .status-icon{ font-size:34px; margin-bottom:6px; }

  /* ---------- Panel Kelola Pengguna (Admin) ---------- */
  #bst-root .user-section-title{
    font-family:'Sora',sans-serif; font-weight:700; font-size:11.5px; text-transform:uppercase;
    letter-spacing:0.4px; color:var(--slate); margin:16px 0 8px;
  }
  #bst-root .user-section-title:first-child{ margin-top:0; }
  #bst-root .user-row{
    display:flex; align-items:center; gap:10px; padding:11px 0; border-bottom:1px solid var(--line); flex-wrap:wrap;
  }
  #bst-root .user-info{ flex:1; min-width:150px; }
  #bst-root .user-name{ font-weight:600; font-size:13px; color:var(--ink); }
  #bst-root .user-email{ font-size:11px; color:var(--slate); margin-top:1px; }
  #bst-root .user-role-select{
    font-family:'Inter',sans-serif; font-size:12px; padding:6px 8px; border-radius:8px;
    border:1px solid var(--line); background:#fff; color:var(--ink);
  }
  #bst-root .user-actions{ display:flex; gap:6px; }
  #bst-root .danger-text{ color:var(--red); border-color:var(--red); }
  #bst-root .danger-text:hover{ background:var(--red-dim); }
  #bst-root .user-self-tag{ font-size:10px; color:var(--slate); font-weight:400; }

  /* ---------- Header ---------- */
  #bst-root .bst-header{
    background:linear-gradient(135deg, #0F1720 0%, #1B2733 55%, #0F1720 100%);
    color:var(--paper); padding:22px 26px; border-radius:14px 14px 0 0;
    display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
    position:relative; overflow:hidden;
  }
  #bst-root .bst-header::after{
    content:""; position:absolute; right:-40px; top:-40px; width:150px; height:150px;
    border:1px dashed rgba(5,150,105,0.35); border-radius:50%;
  }
  #bst-root .bst-header::before{
    content:""; position:absolute; left:30%; bottom:-60px; width:120px; height:120px;
    background:radial-gradient(circle, rgba(5,150,105,0.25) 0%, transparent 70%);
  }
  #bst-root .bst-title{ font-size:20px; font-weight:700; letter-spacing:0.2px; }
  #bst-root .bst-sub{ font-size:12px; color:#9CA9B6; margin-top:3px; font-family:'JetBrains Mono',monospace; }
  #bst-root .bst-header-actions{ display:flex; gap:10px; align-items:center; z-index:1; flex-wrap:wrap; }
  #bst-root .bst-count-pill{
    font-family:'JetBrains Mono',monospace; font-size:12px; background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.18); padding:6px 12px; border-radius:20px; color:var(--paper);
  }
  #bst-root .btn{
    font-family:'Inter',sans-serif; font-weight:600; font-size:13.5px; padding:9px 16px; border-radius:9px;
    border:none; cursor:pointer; transition:transform .12s ease, background .15s ease, box-shadow .15s ease;
  }
  #bst-root .btn:active{ transform:scale(0.97); }
  #bst-root .btn-primary{ background:var(--primary); color:#fff; box-shadow:0 1px 3px rgba(5,150,105,0.4); }
  #bst-root .btn-primary:hover{ background:#047857; transform:translateY(-1px); box-shadow:0 4px 10px rgba(5,150,105,0.35); }
  #bst-root .btn-primary:disabled{ background:#9CA3AF; cursor:not-allowed; opacity:.6; box-shadow:none; }
  #bst-root .btn-ghost{ background:transparent; color:var(--paper); border:1px solid rgba(255,255,255,0.22); }
  #bst-root .btn-ghost:hover{ background:rgba(255,255,255,0.08); }
  #bst-root .btn-sm{ padding:5px 10px; font-size:12px; border-radius:7px; }
  #bst-root .btn-logout{
    background:transparent; color:#FCA5A5; border:1.5px solid rgba(220,38,38,0.55);
    font-weight:700;
  }
  #bst-root .btn-logout:hover{ background:var(--red); color:#fff; border-color:var(--red); }

  /* user bar */
  #bst-root .bst-userbar{
    display:flex; align-items:center; gap:10px; padding:5px 10px 5px 5px;

        return 'Dipilih dari Daftar Urut Kepangkatan (DUK) saat masuk sebagai Pemohon, tidak dapat diketik ulang.';
      case 'tglPersetujuan': return entry.tglPersetujuan ? 'Sudah disetujui.' : 'Menunggu Tanggal Permohonan.';
      case 'tglProses': return entry.tglProses ? 'Sudah diproses.' : 'Menunggu persetujuan Kasub BMN.';
      case 'tglPemeriksaan': return entry.tglPemeriksaan ? 'Sudah diperiksa.' : 'Menunggu tahap Proses Permohonan.';
      case 'hasilPemeriksaan': return entry.tglSelesaiPekerjaan ? 'Pekerjaan sudah selesai, tidak dapat diubah.' : 'Menunggu tahap Proses Permohonan.';
      case 'estimasi': return entry.tglSelesaiPekerjaan ? 'Pekerjaan sudah selesai.' : 'Menunggu tahap Proses Permohonan.';
      case 'tglSelesaiPekerjaan': return entry.tglSelesaiPekerjaan ? 'Sudah selesai.' : 'Menunggu Tanggal Pemeriksaan & Hasil Pemeriksaan diisi.';
      default: return entry.tglPersetujuan ? 'Sudah disetujui, data terkunci.' : '';
    }
  }

  function todayISO(){
    const d = new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function fmtDate(iso){
    if(!iso) return null;
    const d = new Date(iso + 'T00:00:00');
    if(isNaN(d)) return null;
    const bulan = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
    return d.getDate() + ' ' + bulan[d.getMonth()] + ' ' + d.getFullYear();
  }
  function escapeHtml(str){ const d=document.createElement('div'); d.textContent = str||''; return d.innerHTML; }
  function escapeAttr(str){ return (str||'').replace(/"/g,'&quot;'); }

  function getStatus(e){
    if(e.persetujuanStatus === 'ditolak') return 'ditolak';
    const doneCount = STEPS.filter(s => e[s.key]).length;
    const isOverdue = e.estimasi && !e.tglSelesaiPekerjaan && e.estimasi < todayISO();
    if(doneCount === STEPS.length) return 'selesai';
    if(isOverdue) return 'telat';
    if(doneCount === 0) return 'baru';
    if(e.tglPersetujuan && !e.tglProses) return 'disetujui';
    return 'proses';
  }
  // Menghitung ketepatan waktu penyelesaian dibanding tanggal estimasi.
  // null = belum selesai / tidak ada estimasi untuk dibandingkan.
  function getLateness(e){
    if(!e.tglSelesaiPekerjaan || !e.estimasi) return null;
    const est = new Date(e.estimasi + 'T00:00:00');
    const done = new Date(e.tglSelesaiPekerjaan + 'T00:00:00');
    if(isNaN(est) || isNaN(done)) return null;
    const diffDays = Math.round((done - est) / (1000*60*60*24));
    if(diffDays <= 0) return 'ontime';
    if(diffDays <= 3) return 'late1_3';
    return 'late_gt3';
  }
  function statusBadge(status, e){
    if(status === 'selesai'){
      const lateness = e ? getLateness(e) : null;
      if(lateness === 'late1_3') return '<span class="badge badge-selesai-kuning">Selesai &middot; Terlambat 1&ndash;3 Hari</span>';
      if(lateness === 'late_gt3') return '<span class="badge badge-selesai-merah">Selesai &middot; Terlambat &gt;3 Hari</span>';
      return '<span class="badge badge-selesai">Selesai &middot; Tepat Waktu</span>';
    }
    const map = {
      baru:{cls:'badge-baru',txt:'Baru'}, disetujui:{cls:'badge-disetujui',txt:'Disetujui'},
      proses:{cls:'badge-proses',txt:'Proses'},
      telat:{cls:'badge-telat',txt:'Lewat Estimasi'}, ditolak:{cls:'badge-ditolak',txt:'Ditolak'},
    };
    const m = map[status];
    return '<span class="badge '+m.cls+'">'+m.txt+'</span>';
  }
  function statusCssClass(status, e){
    if(status === 'selesai'){
      const lateness = e ? getLateness(e) : null;
      if(lateness === 'late1_3') return 'ticket-selesai-kuning';
      if(lateness === 'late_gt3') return 'ticket-selesai-merah';
      return 'ticket-selesai';
    }
    return 'ticket-' + status;
  }

  /* ============ PERSETUJUAN KASUB BMN (Setuju / Tidak Setuju) ============ */
  function renderPersetujuanSection(e){
    if(e.tglPersetujuan && e.persetujuanStatus !== 'ditolak'){
      let html = `<div class="approved-note">Disetujui oleh <b>${escapeHtml(e.approvedBy||'-')}</b> pada ${fmtDate(e.tglPersetujuan)}.</div>`;
      if(currentUser.role === 'admin'){
        html += `<button class="btn btn-ghost btn-sm" id="btn-reset-persetujuan" style="margin-top:8px;">Reset Keputusan (Admin)</button>`;
      }
      return html;
    }
    if(e.persetujuanStatus === 'ditolak'){
      let html = `<div class="rejected-note">Ditolak oleh <b>${escapeHtml(e.ditolakOleh||'-')}</b> pada ${fmtDate(e.tglPenolakan)}.<br>Alasan: ${escapeHtml(e.alasanPenolakan||'-')}</div>`;
      if(currentUser.role === 'admin'){
        html += `<button class="btn btn-ghost btn-sm" id="btn-reset-persetujuan" style="margin-top:8px;">Reset Keputusan (Admin)</button>`;
      }
      return html;
    }
    const canDecide = (currentUser.role === 'kasub_bmn' || currentUser.role === 'admin') && !!e.tglPermohonan;
    if(canDecide){
      return `<div class="decision-buttons">
        <button class="btn btn-primary" id="btn-setuju">&#10003; Setuju</button>
        <button class="btn btn-ghost danger-text" id="btn-tolak">&#10007; Tidak Setuju</button>
      </div>`;
    }
    return `<div class="field-hint locked">${!e.tglPermohonan ? 'Menunggu Tanggal Permohonan.' : 'Hanya dapat diputuskan oleh Kasub BMN.'}</div>`;
  }

  async function decidePersetujuan(id, approve){
    const e = entries.find(x=>x.id===id);
    if(!e) return;
    if(approve){
      if(!confirm('Setujui permohonan ini?')) return;
      closeModal();
      await updateEntryRemote(id, {
        tglPersetujuan: todayISO(), approvedBy: currentUser.name, persetujuanStatus: 'disetujui',
      });
    } else {
      const reason = prompt('Alasan tidak menyetujui permohonan ini:');
      if(reason === null) return; // dibatalkan
      const trimmed = reason.trim();
      if(!trimmed){ alert('Alasan wajib diisi.'); return; }
      closeModal();
      await updateEntryRemote(id, {
        persetujuanStatus: 'ditolak', tglPenolakan: todayISO(),
        ditolakOleh: currentUser.name, alasanPenolakan: trimmed,
      });
    }
  }

  async function resetPersetujuan(id){
    if(!confirm('Reset keputusan persetujuan? Kasub BMN akan bisa memutuskan ulang.')) return;
    closeModal();
    await updateEntryRemote(id, {
      tglPersetujuan: null, approvedBy: null, persetujuanStatus: null,
      tglPenolakan: null, ditolakOleh: null, alasanPenolakan: null,
    });
  }

  /* ============================================================
     AUTENTIKASI
     - Pemohon: tanpa akun, hanya isi nama, sesi disimpan di localStorage perangkat.
     - Kasub BMN / Vendor / Monitor / Admin: WAJIB akun email+password (Firebase Auth),
       dan baru bisa memakai dashboard setelah statusnya "approved" oleh seorang Admin
       (disimpan di Firestore, koleksi 'bst_users').
  ============================================================ */
  function loadPemohonSession(){
    try{
      const raw = localStorage.getItem(USER_KEY);
      const u = raw ? JSON.parse(raw) : null;
      if(u && u.role === 'pemohon'){ currentUser = u; }
    }catch(err){ /* abaikan */ }
  }
  function savePemohonSession(u){
    currentUser = u;
    try{ localStorage.setItem(USER_KEY, JSON.stringify(u)); }
    catch(err){ console.error('Gagal menyimpan sesi Pemohon', err); }
  }

  async function logout(){
    if(unsubscribeEntries){ unsubscribeEntries(); unsubscribeEntries = null; }
    if(unsubscribeUsers){ unsubscribeUsers(); unsubscribeUsers = null; }
    if(currentUser && currentUser.role !== 'pemohon'){
      try{ await window.bstAuth.logoutStaff(); }catch(err){ console.error(err); }
      // window.bstOnAuthChange akan otomatis dipanggil ulang oleh Firebase setelah sign-out
    } else {
      currentUser = null;
      try{ localStorage.removeItem(USER_KEY); }catch(err){}
      renderChoose();
    }
  }

  // Dipanggil oleh modul Firebase setiap kali status login berubah (masuk / keluar / muat ulang halaman)
  async function handleAuthChange(fbUser){
    if(unsubscribeEntries){ unsubscribeEntries(); unsubscribeEntries = null; }
    if(unsubscribeUsers){ unsubscribeUsers(); unsubscribeUsers = null; }

    if(fbUser){
      let profile = null;
      try{ profile = await window.bstAuth.getUserProfile(fbUser.uid); }
      catch(err){ console.error('Gagal memuat profil pengguna:', err); renderChoose(); return; }

      if(!profile){
        renderPendingScreen({ email: fbUser.email, name: fbUser.email });
        return;
      }
      if(profile.status === 'approved'){
        currentUser = { uid: fbUser.uid, email: profile.email, name: profile.name || profile.email, role: profile.role, status:'approved' };
        initDashboard();
      } else if(profile.status === 'rejected'){
        renderRejectedScreen(profile);
      } else {
        renderPendingScreen(profile);
      }
    } else {
      loadPemohonSession();
      if(currentUser && currentUser.role === 'pemohon'){
        initDashboard();
      } else {
        currentUser = null;
        renderChoose();
      }
    }
  }
  window.bstOnAuthChange = handleAuthChange; // dipanggil dari modul Firebase (lihat <script type="module">)

  function startEntriesSync(){

        renderDashboard();

  async function createEntryRemote(entryData){
    setSync(false, 'menyimpan...');

      setSync(false, 'tersimpan');
      return true;
    }catch(err){
      console.error('Gagal menyimpan permohonan:', err);

      setSync(true, 'GAGAL MENYIMPAN');

    setSync(false, 'menyimpan...');
    try{
      await window.bstFirestore.updateEntry(id, patch);
      setSync(false, 'tersimpan');
      return true;
    }catch(err){
      console.error('Gagal menyimpan perubahan:', err);
      alert('Gagal menyimpan perubahan ke server: ' + err.message);
      setSync(true, 'GAGAL MENYIMPAN');
      return false;
    }
  }
  async function deleteEntryRemote(id){
    setSync(false, 'menghapus...');
    try{
      await window.bstFirestore.deleteEntry(id);
      setSync(false, 'tersimpan');
      return true;
    }catch(err){

        const permohonan = list.filter(e=> getStatus(e) === 'baru').length;

  function randomPassword(){
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789';
    let out = '';
    for(let i=0;i<10;i++){ out += chars[Math.floor(Math.random()*chars.length)]; }
    return out;
  }

  function renderUserList(list){
    const area = document.getElementById('user-list-area');
    if(!area) return; // modal sudah ditutup

    if(list.length === 0){
      area.innerHTML = '<div class="bst-empty">Belum ada pendaftaran akun staf.</div>';
      return;
    }

    const order = { pending:0, approved:1, rejected:2 };
    list.sort((a,b)=> (order[a.status]??9) - (order[b.status]??9) || (a.name||'').localeCompare(b.name||''));

    const groups = { pending:[], approved:[], rejected:[] };
    list.forEach(u=>{ (groups[u.status] || groups.pending).push(u); });

    const roleOptions = (currentRole)=> STAFF_ROLES.map(r=>
      `<option value="${r.key}" ${currentRole===r.key?'selected':''}>${r.name}</option>`
    ).join('');

    function row(u){
      let actions = '';
      if(u.status === 'pending'){
        actions = `<button class="btn btn-primary btn-sm" data-action="approve" data-uid="${u.id}">Setujui</button>
                   <button class="btn btn-ghost btn-sm danger-text" data-action="reject" data-uid="${u.id}">Tolak</button>`;
      } else if(u.status === 'approved'){
        actions = `<button class="btn btn-ghost btn-sm danger-text" data-action="revoke" data-uid="${u.id}">Cabut Akses</button>`;
      } else {
        actions = `<button class="btn btn-primary btn-sm" data-action="approve" data-uid="${u.id}">Setujui Kembali</button>`;
      }
      const isSelf = currentUser.uid && u.id === currentUser.uid;
      return `<div class="user-row" data-row-uid="${u.id}">
        <div class="user-info">
          <div class="user-name" id="uname-${u.id}">${escapeHtml(u.name||'(tanpa nama)')}${isSelf ? ' <span class="user-self-tag">(Anda)</span>' : ''}</div>
          <div class="user-email mono">${escapeHtml(u.email||'-')}</div>
        </div>
        <select class="user-role-select" id="role-${u.id}">${roleOptions(u.role)}</select>
        ${userStatusBadge(u.status)}
        <div class="user-actions">
          ${actions}
          <button class="icon-btn" data-action="edit" data-uid="${u.id}" title="Edit nama">&#9998;</button>
          ${isSelf ? '' : `<button class="icon-btn danger" data-action="delete" data-uid="${u.id}" title="Hapus akun">&#128465;</button>`}
        </div>
      </div>`;
    }

    area.innerHTML = `
      ${groups.pending.length ? `<div class="user-section-title">Menunggu Persetujuan (${groups.pending.length})</div>${groups.pending.map(row).join('')}` : ''}
      ${groups.approved.length ? `<div class="user-section-title">Disetujui (${groups.approved.length})</div>${groups.approved.map(row).join('')}` : ''}
      ${groups.rejected.length ? `<div class="user-section-title">Ditolak (${groups.rejected.length})</div>${groups.rejected.map(row).join('')}` : ''}
    `;

    area.querySelectorAll('button[data-action]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const uidTarget = btn.getAttribute('data-uid');
        const action = btn.getAttribute('data-action');
        const roleSel = document.getElementById('role-'+uidTarget);
        const chosenRole = roleSel ? roleSel.value : null;

        if(action === 'approve'){
          btn.disabled = true; btn.textContent = 'Memproses...';
          try{
            await window.bstAuth.setUserStatus(uidTarget, {
              status:'approved', role:chosenRole,
              approvedBy: currentUser.name, approvedAt: new Date().toISOString(),
            });
          }catch(err){ console.error(err); alert('Gagal menyetujui pengguna: ' + err.message); }
        } else if(action === 'reject'){
          if(!confirm('Tolak pendaftaran akun ini?')) return;
          btn.disabled = true; btn.textContent = 'Memproses...';
          try{ await window.bstAuth.setUserStatus(uidTarget, { status:'rejected' }); }
          catch(err){ console.error(err); alert('Gagal menolak pengguna: ' + err.message); }
        } else if(action === 'revoke'){
          if(!confirm('Cabut akses akun ini? Pengguna tidak akan bisa masuk lagi sampai disetujui ulang.')) return;
          btn.disabled = true; btn.textContent = 'Memproses...';
          try{ await window.bstAuth.setUserStatus(uidTarget, { status:'rejected' }); }
          catch(err){ console.error(err); alert('Gagal mencabut akses: ' + err.message); }
        } else if(action === 'edit'){
          const nameEl = document.getElementById('uname-'+uidTarget);
          if(!nameEl) return;
          const currentName = nameEl.textContent.replace('(Anda)','').trim();
          const newName = prompt('Ubah nama pengguna:', currentName);
          if(newName === null) return; // dibatalkan
          const trimmed = newName.trim();
          if(!trimmed){ alert('Nama tidak boleh kosong.'); return; }
          btn.disabled = true;
          try{
            await window.bstAuth.setUserStatus(uidTarget, { name: trimmed, role: chosenRole });
          }catch(err){ console.error(err); alert('Gagal menyimpan perubahan: ' + err.message); }
          finally{ btn.disabled = false; }
        } else if(action === 'delete'){
          const rowEl = document.querySelector('[data-row-uid="'+uidTarget+'"]');
          const nameTxt = rowEl ? rowEl.querySelector('.user-name').textContent.trim() : 'akun ini';
          if(!confirm('Hapus akun "'+nameTxt+'" secara permanen dari daftar pengguna? Pengguna tidak akan bisa masuk lagi.\\n\\nCatatan: ini menghapus profil di aplikasi. Kredensial login (email/kata sandi) di Firebase Authentication tidak ikut terhapus otomatis — hapus manual lewat Firebase Console jika ingin benar-benar menutup aksesnya.')) return;
          btn.disabled = true;
          try{ await window.bstAuth.deleteUserProfile(uidTarget); }
          catch(err){ console.error(err); alert('Gagal menghapus pengguna: ' + err.message); }
        }
        // Tampilan akan diperbarui otomatis lewat listener realtime.
      });
    });
  }

  /* ============ LIST RENDER ============ */
  function getFilteredEntries(){
    const searchEl = document.getElementById('bst-search');
    const filterEl = document.getElementById('bst-filter');
    const q = (searchEl && searchEl.value.trim().toLowerCase()) || '';
    const filter = (filterEl && filterEl.value) || 'all';

    let filtered = entries.filter(e=>{
      const matchQ = !q || (e.nama||'').toLowerCase().includes(q) || (e.nup||'').toLowerCase().includes(q) || (e.jenis||'').toLowerCase().includes(q) || (e.nip||'').toLowerCase().includes(q);
      const status = getStatus(e);
      const matchF = filter === 'all' || status === filter;
      return matchQ && matchF;
    });
    filtered.sort((a,b)=> (b.tglPermohonan||'').localeCompare(a.tglPermohonan||''));
    return filtered;
  }

  function statusText(status, e){
    if(status === 'selesai'){
      const lateness = e ? getLateness(e) : null;
      if(lateness === 'late1_3') return 'Selesai - Terlambat 1-3 Hari';
      if(lateness === 'late_gt3') return 'Selesai - Terlambat >3 Hari';
      return 'Selesai - Tepat Waktu';
    }
    const map = { baru:'Baru', disetujui:'Disetujui', proses:'Proses', telat:'Lewat Estimasi', ditolak:'Ditolak' };
    return map[status] || status;
  }

  function printRecap(){
    const list = getFilteredEntries();
    if(list.length === 0){ alert('Tidak ada data untuk dicetak sesuai pencarian/filter saat ini.'); return; }

    const rows = list.map((e,i)=>{
      const status = getStatus(e);
      return '<tr>'
        + '<td>'+(i+1)+'</td>'
        + '<td>'+escapeHtml(e.nama)+'</td>'
        + '<td>'+escapeHtml(e.nip||'-')+'</td>'
        + '<td>'+escapeHtml(e.eselonII||'-')+'</td>'
        + '<td>'+escapeHtml(e.jabatan||'-')+'</td>'
        + '<td>'+escapeHtml(e.nup)+'</td>'
        + '<td>'+escapeHtml(e.jenis||'-')+'</td>'
        + '<td>'+escapeHtml(e.kendala||'-')+'</td>'
        + '<td>'+(e.tglPermohonan?fmtDate(e.tglPermohonan):'-')+'</td>'
        + '<td>'+(e.tglPersetujuan?(fmtDate(e.tglPersetujuan)+(e.approvedBy?(' ('+escapeHtml(e.approvedBy)+')'):'')):'-')+'</td>'
        + '<td>'+(e.tglProses?fmtDate(e.tglProses):'-')+'</td>'
        + '<td>'+(e.tglPemeriksaan?fmtDate(e.tglPemeriksaan):'-')+'</td>'
        + '<td>'+escapeHtml(e.hasilPemeriksaan||'-')+'</td>'
        + '<td>'+(e.estimasi?fmtDate(e.estimasi):'-')+'</td>'
        + '<td>'+(e.tglSelesaiPekerjaan?fmtDate(e.tglSelesaiPekerjaan):'-')+'</td>'
        + '<td>'+statusText(status, e)+'</td>'
        + '</tr>';
    }).join('');

    let printArea = document.getElementById('bst-print-area');
    if(!printArea){
      printArea = document.createElement('div');
      printArea.id = 'bst-print-area';
      document.body.appendChild(printArea);
    }
    printArea.innerHTML = '<div class="print-head">'
      + '<h1>Rekapitulasi Layanan Servis BMN &mdash; Peralatan &amp; Mesin</h1>'
      + '<div class="print-meta">Dicetak oleh: '+escapeHtml(currentUser.name)+' ('+ROLE_LABEL[currentUser.role]+') &middot; '+new Date().toLocaleString('id-ID')+' &middot; Total: '+list.length+' permohonan</div>'
      + '</div>'
      + '<table class="print-table"><thead><tr>'
        + '<th>No</th><th>Nama Pemohon</th><th>NIP</th><th>Eselon II</th><th>Jabatan</th><th>NUP</th><th>Jenis Peralatan &amp; Mesin</th><th>Kendala</th>'
        + '<th>Tgl Permohonan</th><th>Tgl Persetujuan Kasub BMN</th><th>Tgl Proses</th><th>Tgl Pemeriksaan</th>'
        + '<th>Hasil Pemeriksaan</th><th>Estimasi Selesai</th><th>Tgl Selesai Pekerjaan</th><th>Status</th>'
      + '</tr></thead><tbody>'+rows+'</tbody></table>';

    setTimeout(()=> window.print(), 80);
  }

  function renderDashboard(){
    const bodyEl = document.getElementById('bst-body');
    const countPill = document.getElementById('bst-count-pill');
    if(!bodyEl) return;

    const filtered = getFilteredEntries();

    if(countPill) countPill.textContent = entries.length + ' permohonan';

    if(filtered.length === 0){
      bodyEl.innerHTML = '<div class="bst-empty"><div class="empty-icon">&#128203;</div><div class="disp" style="font-size:16px;margin-bottom:6px;">Belum ada permohonan yang cocok</div>'
        + ((currentUser.role === 'pemohon' || currentUser.role === 'admin') ? 'Klik "+ Permohonan Baru" untuk mulai mencatat, atau ubah pencarian/filter.' : 'Coba ubah kata kunci pencarian atau filter status.')
        + '</div>';
      return;
    }

    bodyEl.innerHTML = filtered.map(e => renderTicket(e)).join('');
    filtered.forEach(e=>{
      const openBtn = document.getElementById('open-'+e.id);
      const delBtn = document.getElementById('del-'+e.id);
      if(openBtn) openBtn.addEventListener('click', ()=> openDetailModal(e.id));
      if(delBtn) delBtn.addEventListener('click', ()=> deleteEntry(e.id));
    });
  }

  function renderTicket(e){
    const status = getStatus(e);
    const statusCls = statusCssClass(status, e);
    const doneCount = STEPS.filter(s=>e[s.key]).length;
    const stepsHtml = STEPS.map((s, idx)=>{
      const val = e[s.key];
      let cls = '';
      if(val) cls = 'done'; else if(idx === doneCount) cls = 'current';
      const nodeIcon = val ? '&#10003;' : s.icon;
      return '<div class="step '+cls+'"><div class="node"><span class="node-icon">'+nodeIcon+'</span></div><div class="lbl">'+s.label+'</div>'
        + (val ? '<div class="dt">'+fmtDate(val)+'</div>' : '') + '</div>';
    }).join('');

    const overdue = e.estimasi && !e.tglSelesaiPekerjaan && e.estimasi < todayISO();
    const canDelete = (currentUser.role === 'pemohon' && !e.tglPersetujuan) || currentUser.role === 'admin';

    return '<div class="ticket '+statusCls+'">'
      + '<div class="ticket-top">'
        + '<div>'
          + '<div class="ticket-name">'+escapeHtml(e.nama||'(tanpa nama)')+'</div>'
          + '<div class="ticket-jenis">'+escapeHtml(e.jenis||'-')+'</div>'
          + (e.kendala ? '<div class="ticket-kendala">Kendala: '+escapeHtml(e.kendala)+'</div>' : '')
        + '</div>'
        + '<div style="display:flex;align-items:center;gap:10px;">'
          + statusBadge(status, e)
          + '<div class="ticket-actions">'
            + '<button class="icon-btn" id="open-'+e.id+'" title="Lihat / Ubah">&#128065;</button>'
            + (canDelete ? '<button class="icon-btn danger" id="del-'+e.id+'" title="Hapus">&#128465;</button>' : '')
          + '</div>'
        + '</div>'
      + '</div>'
      + '<div class="stepper">'+stepsHtml+'</div>'
      + (e.hasilPemeriksaan ? '<div class="hasil-preview"><b>Hasil Pemeriksaan</b>'+escapeHtml(e.hasilPemeriksaan)+'</div>' : '')
      + '<div class="ticket-foot">'
        + '<span>NUP: <span class="nup">'+escapeHtml(e.nup||'-')+'</span> &middot; NIP: <span class="nup">'+escapeHtml(e.nip||'-')+'</span></span>'
        + '<span class="estimasi '+(overdue?'overdue':'')+'">Estimasi selesai: '+(e.estimasi ? fmtDate(e.estimasi) : '-')+(overdue ? ' (lewat)' : '')+'</span>'
      + '</div>'
    + '</div>';
  }

  /* ============ CREATE MODAL (pemohon & admin) ============ */
  function openCreateModal(){
    const isPemohon = currentUser.role === 'pemohon';
    const overlay = document.createElement('div');
    overlay.className = 'bst-overlay';
    overlay.id = 'bst-overlay';
    overlay.innerHTML = `
      <div class="bst-modal">
        <div class="bst-modal-head">
          <div class="disp">Permohonan Servis Baru</div>
          <button class="close-x" id="bst-close">&times;</button>
        </div>
        <div class="bst-modal-body">
          ${isPemohon ? `
          <div class="note">Diajukan sebagai: <b>${escapeHtml(currentUser.name)}</b> (NIP ${escapeHtml(currentUser.nip||'-')})<br>${escapeHtml(currentUser.eselonII||'-')} &middot; ${escapeHtml(currentUser.jabatan||'-')}</div>
          ` : `
          <div class="field-row">
            <div class="field"><label>Nama Pemohon <span class="req">*</span></label>
              <input type="text" id="f-nama" placeholder="Nama lengkap pemohon"></div>
            <div class="field"><label>NIP <span class="req">*</span></label>
              <input type="text" id="f-nip" placeholder="NIP"></div>
          </div>
          <div class="field-row">
            <div class="field"><label>Eselon II <span class="req">*</span></label>
              <input type="text" id="f-eselon2" placeholder="Eselon II"></div>
            <div class="field"><label>Jabatan</label>
              <input type="text" id="f-jabatan" placeholder="Jabatan"></div>
          </div>
          `}
          <div class="field-row">
            <div class="field"><label>NUP <span class="req">*</span></label>
              <input type="text" id="f-nup" placeholder="Nomor Urut Pendaftaran"></div>
            <div class="field"><label>Jenis Peralatan &amp; Mesin</label>
              <input type="text" id="f-jenis" placeholder="mis. Printer, AC, Laptop"></div>
          </div>
          <div class="field"><label>Kendala / Keluhan dari Pemohon</label>
            <textarea id="f-kendala" placeholder="Jelaskan kendala atau kerusakan yang dialami"></textarea></div>
          <div class="field"><label>Tanggal Permohonan</label>
            <input type="date" id="f-tglPermohonan" value="${todayISO()}"></div>
          <div class="note">Setelah diajukan, permohonan menunggu persetujuan Kasub BMN sebelum dapat diproses vendor.</div>
        </div>
        <div class="bst-modal-foot">
          <button class="btn btn-ghost" id="bst-cancel" style="color:var(--ink);border-color:var(--line);">Batal</button>
          <button class="btn btn-primary" id="bst-save">Ajukan Permohonan</button>
        </div>
      </div>`;
    root.appendChild(overlay);
    document.getElementById('bst-close').addEventListener('click', closeModal);
    document.getElementById('bst-cancel').addEventListener('click', closeModal);
    overlay.addEventListener('click', ev=>{ if(ev.target === overlay) closeModal(); });
    document.getElementById('bst-save').addEventListener('click', submitCreate);
  }

  async function submitCreate(){
    const isPemohon = currentUser.role === 'pemohon';
    let nama, nip, eselonII, jabatan;
    if(isPemohon){
      nama = currentUser.name; nip = currentUser.nip; eselonII = currentUser.eselonII; jabatan = currentUser.jabatan;
    } else {
      nama = document.getElementById('f-nama').value.trim();
      nip = document.getElementById('f-nip').value.trim();
      eselonII = document.getElementById('f-eselon2').value.trim();
      jabatan = document.getElementById('f-jabatan').value.trim();
      if(!nama || !nip || !eselonII){ alert('Nama, NIP, dan Eselon II wajib diisi.'); return; }
    }
    const nup = document.getElementById('f-nup').value.trim();
    const tglPermohonan = document.getElementById('f-tglPermohonan').value;
    if(!nup){ alert('NUP wajib diisi.'); return; }
    if(!tglPermohonan){ alert('Tanggal Permohonan wajib diisi.'); return; }

    const entryData = {
      nama, nip, eselonII, jabatan, nup,
      jenis: document.getElementById('f-jenis').value.trim(),
      kendala: document.getElementById('f-kendala').value.trim(),
      tglPermohonan,
      tglPersetujuan: null, approvedBy: null, persetujuanStatus: null,
      tglPenolakan: null, ditolakOleh: null, alasanPenolakan: null,
      tglProses: null,
      tglPemeriksaan: null, hasilPemeriksaan: '',
      estimasi: null,
      tglSelesaiPekerjaan: null,
      createdBy: currentUser.name, createdByRole: currentUser.role,
      createdAt: new Date().toISOString(),
    };
    closeModal();
    await createEntryRemote(entryData); // tampilan akan otomatis diperbarui oleh listener realtime
  }

  /* ============ DETAIL / EDIT MODAL (semua peran, dibatasi per bagian) ============ */
  function openDetailModal(id){
    const e = entries.find(x=>x.id===id);
    if(!e) return;

    function inputField(labelText, fieldKey, type, opts){
      opts = opts || {};
      const editable = canEdit(fieldKey, e);
      const isLockedToday = !!(opts.lockToRole && editable && currentUser.role === opts.lockToRole);
      let hint = fieldHint(fieldKey, e);
      let val = e[fieldKey] || '';
      if(isLockedToday){
        val = todayISO();
        hint = 'Otomatis terkunci ke tanggal hari ini (' + fmtDate(val) + ') &mdash; tidak dapat dimundurkan atau dimajukan.';
      }
      const inputAttrs = !editable ? 'disabled' : (isLockedToday ? 'readonly' : '');
      const tag = type === 'textarea'
        ? `<textarea id="fe-${fieldKey}" ${inputAttrs} placeholder="${opts.placeholder||''}">${escapeHtml(val)}</textarea>`
        : `<input type="${type}" id="fe-${fieldKey}" value="${escapeAttr(val)}" ${inputAttrs}>`;
      return `<div class="field" data-editable="${editable}">
          <label>${labelText}</label>
          ${tag}
          ${hint ? `<div class="field-hint ${editable?'':'locked'}">${hint}</div>` : ''}
        </div>`;
    }

    const overlay = document.createElement('div');
    overlay.className = 'bst-overlay';
    overlay.id = 'bst-overlay';
    overlay.innerHTML = `
      <div class="bst-modal">
        <div class="bst-modal-head">
          <div class="disp">${escapeHtml(e.nama)} &mdash; NUP ${escapeHtml(e.nup)}</div>
          <button class="close-x" id="bst-close">&times;</button>
        </div>
        <div class="bst-modal-body">

          <div class="section-card">
            <div class="section-head"><span class="st">1. Data Permohonan</span><span class="who">Pemohon</span></div>
            <div class="section-body">
              <div class="field-row">
                ${inputField('Nama Pemohon','nama','text')}
                ${inputField('NIP','nip','text')}
              </div>
              <div class="field-row">
                ${inputField('Eselon II','eselonII','text')}
                ${inputField('Jabatan','jabatan','text')}
              </div>
              <div class="field-row">
                ${inputField('NUP','nup','text')}
                ${inputField('Jenis Peralatan &amp; Mesin','jenis','text')}
              </div>
              ${inputField('Kendala / Keluhan dari Pemohon','kendala','textarea')}
              ${inputField('Tanggal Permohonan','tglPermohonan','date')}
            </div>
          </div>

          <div class="section-card">
            <div class="section-head"><span class="st">2. Persetujuan Kasub BMN</span><span class="who">Kasub BMN</span></div>
            <div class="section-body">
              ${renderPersetujuanSection(e)}
            </div>
          </div>

          <div class="section-card">
            <div class="section-head"><span class="st">3. Proses Permohonan</span><span class="who">Monitor</span></div>
            <div class="section-body">
              ${inputField('Tanggal Proses Permohonan','tglProses','date',{lockToRole:'monitor'})}
            </div>
          </div>

          <div class="section-card">
            <div class="section-head"><span class="st">4. Pemeriksaan</span><span class="who">Vendor</span></div>
            <div class="section-body">
              ${inputField('Tanggal Pemeriksaan','tglPemeriksaan','date')}
              ${inputField('Hasil Pemeriksaan','hasilPemeriksaan','textarea',{placeholder:'Diagnosis / temuan kerusakan / tindakan yang diperlukan'})}
            </div>
          </div>

          <div class="section-card">
            <div class="section-head"><span class="st">5. Estimasi Penyelesaian</span><span class="who">Vendor</span></div>
            <div class="section-body">
              ${inputField('Estimasi Penyelesaian Pekerjaan','estimasi','date')}
            </div>
          </div>

          <div class="section-card">
            <div class="section-head"><span class="st">6. Selesai Pekerjaan</span><span class="who">Monitor</span></div>
            <div class="section-body">
              ${inputField('Tanggal Selesai Pekerjaan','tglSelesaiPekerjaan','date')}
            </div>
          </div>

          ${currentUser.role === 'monitor' ? '<div class="note">Sebagai Monitor, Anda dapat mengisi Tanggal Proses Permohonan (setelah Kasub BMN menyetujui) dan Tanggal Selesai Pekerjaan (setelah tahap Pemeriksaan lengkap). Field lain hanya untuk dilihat.</div>' : ''}
        </div>
        <div class="bst-modal-foot">
          <button class="btn btn-ghost" id="bst-cancel" style="color:var(--ink);border-color:var(--line);">Batal</button>
          <button class="btn btn-primary" id="bst-save">Simpan Perubahan</button>
        </div>
      </div>`;
    root.appendChild(overlay);
    document.getElementById('bst-close').addEventListener('click', closeModal);
    document.getElementById('bst-cancel').addEventListener('click', closeModal);
    overlay.addEventListener('click', ev=>{ if(ev.target === overlay) closeModal(); });
    document.getElementById('bst-save').addEventListener('click', ()=> submitEdit(id));
    const setujuBtn = document.getElementById('btn-setuju');
    const tolakBtn = document.getElementById('btn-tolak');
    const resetBtn = document.getElementById('btn-reset-persetujuan');
    if(setujuBtn) setujuBtn.addEventListener('click', ()=> decidePersetujuan(id, true));
    if(tolakBtn) tolakBtn.addEventListener('click', ()=> decidePersetujuan(id, false));
    if(resetBtn) resetBtn.addEventListener('click', ()=> resetPersetujuan(id));
  }

  async function submitEdit(id){
    const e = entries.find(x=>x.id===id);
    if(!e) return;

    const editableFields = Array.from(document.querySelectorAll('#bst-overlay .field[data-editable="true"]'));
    if(editableFields.length === 0){ closeModal(); return; }

    const patch = {};
    editableFields.forEach(fieldDiv=>{
      const input = fieldDiv.querySelector('input, textarea');
      if(!input) return;
      const key = input.id.replace('fe-','');
      patch[key] = input.value.trim();
    });

    // Kunci keras: Tanggal Persetujuan Kasub BMN & Tanggal Proses Permohonan (Vendor)
    // selalu memakai tanggal hari ini, apa pun nilai yang ada di input (jaga-jaga dari
    // manipulasi nilai lewat DevTools browser).
    if('tglPersetujuan' in patch && currentUser.role === 'kasub_bmn'){ patch.tglPersetujuan = todayISO(); }
    if('tglProses' in patch && currentUser.role === 'vendor'){ patch.tglProses = todayISO(); }

    if('nama' in patch && !patch.nama){ alert('Nama Pemohon tidak boleh kosong.'); return; }
    if('nip' in patch && !patch.nip){ alert('NIP tidak boleh kosong.'); return; }
    if('eselonII' in patch && !patch.eselonII){ alert('Eselon II tidak boleh kosong.'); return; }
    if('nup' in patch && !patch.nup){ alert('NUP tidak boleh kosong.'); return; }
    if('tglPermohonan' in patch && !patch.tglPermohonan){ alert('Tanggal Permohonan tidak boleh kosong.'); return; }

    const chronoChecks = [
      ['tglPersetujuan','tglPermohonan','Tanggal Persetujuan Kasub BMN tidak boleh sebelum Tanggal Permohonan.'],
      ['tglProses','tglPersetujuan','Tanggal Proses Permohonan tidak boleh sebelum Tanggal Persetujuan Kasub BMN.'],
      ['tglPemeriksaan','tglProses','Tanggal Pemeriksaan tidak boleh sebelum Tanggal Proses Permohonan.'],
      ['tglSelesaiPekerjaan','tglPemeriksaan','Tanggal Selesai Pekerjaan tidak boleh sebelum Tanggal Pemeriksaan.'],
    ];
    for(const [curKey, prevKey, msg] of chronoChecks){
      const curVal = patch[curKey] !== undefined ? patch[curKey] : e[curKey];
      const prevVal = patch[prevKey] !== undefined ? patch[prevKey] : e[prevKey];
      if(curVal && prevVal && curVal < prevVal){ alert(msg); return; }
    }

    for(const key of Object.keys(patch)){
      if(!canEdit(key, e)){
        alert('Anda tidak memiliki izin untuk mengubah field ini pada tahap ini.');
        return;
      }
    }

    if('tglPersetujuan' in patch && patch.tglPersetujuan){
      patch.approvedBy = currentUser.name;
    }

    patch.lastEditedBy = currentUser.name;
    patch.lastEditedAt = new Date().toISOString();

    closeModal();
    await updateEntryRemote(id, patch);
  }

  async function deleteEntry(id){
    const e = entries.find(x=>x.id===id);
    if(!e) return;

    if(e.tglPersetujuan && currentUser.role !== 'admin'){
      alert('Permohonan ini sudah disetujui oleh Kasub BMN ('+(e.approvedBy?escapeHtml(e.approvedBy):'-')+' pada '+fmtDate(e.tglPersetujuan)+') sehingga tidak dapat dihapus.');
      return;
    }

    const confirmMsg = (currentUser.role === 'admin' && e.tglPersetujuan)
      ? 'PERINGATAN: permohonan ini sudah disetujui Kasub BMN dan mungkin sedang/sudah diproses. Menghapus akan menghilangkan seluruh riwayat proses secara permanen. Lanjutkan sebagai Admin?'
      : 'Hapus permohonan ini? Tindakan ini tidak dapat dibatalkan.';
    if(!confirm(confirmMsg)) return;
    await deleteEntryRemote(id);
  }

  function closeModal(){
    const overlay = document.getElementById('bst-overlay');
    if(overlay) overlay.remove();
  }

  window.bstBoot = function(){ renderChoose(); }; // fallback awal sebelum status auth pertama diketahui
  window.bstBoot();
})();

</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, getDoc, setDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { firebaseConfig } from "./firebase-config.js";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const secondaryApp = initializeApp(firebaseConfig, "Secondary");
  const secondaryAuth = getAuth(secondaryApp);

  const ENTRIES_COLLECTION = 'bmn_permohonan';
  const USERS_COLLECTION = 'bst_users';
  const entriesCol = collection(db, ENTRIES_COLLECTION);
  const usersCol = collection(db, USERS_COLLECTION);

  window.bstFirestore = {
    listenEntries(onData, onError){
      return onSnapshot(entriesCol, (snap)=>{
        const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        onData(list);
      }, onError);
    },
    async addEntry(data){ await addDoc(entriesCol, data); },
    async updateEntry(id, patch){ await updateDoc(doc(db, ENTRIES_COLLECTION, id), patch); },
    async deleteEntry(id){ await deleteDoc(doc(db, ENTRIES_COLLECTION, id)); },
  };

  window.bstAuth = {
    async registerStaff(name, email, password, role){
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await setDoc(doc(db, USERS_COLLECTION, cred.user.uid), {
        name, email, role, status: 'pending', createdAt: new Date().toISOString(),
      });
      return cred.user.uid;
    },
    async loginStaff(email, password){
      return await signInWithEmailAndPassword(auth, email, password);
    },
    async logoutStaff(){
      await signOut(auth);
    },
    async getUserProfile(uid){
      const snap = await getDoc(doc(db, USERS_COLLECTION, uid));
      return snap.exists() ? snap.data() : null;
    },
    listenUsers(onData, onError){
      return onSnapshot(usersCol, (snap)=>{
        const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        onData(list);
      }, onError);
    },
    async setUserStatus(uid, patch){
      await updateDoc(doc(db, USERS_COLLECTION, uid), patch);
    },
    async deleteUserProfile(uid){
      await deleteDoc(doc(db, USERS_COLLECTION, uid));
    },
    async adminCreateStaffAccount(name, email, password, role, adminName){
      const cred = await createUserWithEmailAndPassword(secondaryAuth, email, password);
      const newUid = cred.user.uid;
      await signOut(secondaryAuth);
      await setDoc(doc(db, USERS_COLLECTION, newUid), {
        name, email, role, status: 'approved',
        createdAt: new Date().toISOString(),
        approvedBy: adminName, approvedAt: new Date().toISOString(),
        createdByAdmin: true,
      });
      return newUid;
    },
  };

  onAuthStateChanged(auth, (fbUser)=>{
    if(window.bstOnAuthChange){ window.bstOnAuthChange(fbUser); }
  });
</script>

</body>
